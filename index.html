<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScienceHub — Filières Marocaines</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1e;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
:root{
  --a:#4cc9f0;--card:#111827;
  --b:rgba(76,201,240,0.15);--b2:rgba(76,201,240,0.3);
  --muted:#8b9ab0
}

/* ===== NAVBAR ===== */
nav{
  background:rgba(10,15,30,0.97);
  display:flex;justify-content:space-between;align-items:center;
  padding:0 5%;height:60px;
  border-bottom:1px solid var(--b);
  position:sticky;top:0;z-index:200
}
.logo{font-size:19px;font-weight:800;color:var(--a);display:flex;align-items:center;gap:8px}
.li{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#4cc9f0,#7b5ea7);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#fff
}
nav ul{display:flex;list-style:none;gap:4px;align-items:center}
nav ul li a{
  color:var(--muted);text-decoration:none;
  padding:7px 13px;border-radius:7px;font-size:13px;transition:.2s
}
nav ul li a:hover{color:#e2e8f0;background:rgba(255,255,255,0.06)}
.nav-cta{background:var(--a);color:#0a0f1e !important;font-weight:700}
.nav-cta:hover{background:#38b6d9 !important}

/* ===== HERO ===== */
.hero{
  text-align:center;padding:50px 5% 35px;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(76,201,240,0.09),transparent)
}
.hb{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(76,201,240,0.08);border:1px solid var(--b2);
  color:var(--a);padding:5px 13px;border-radius:20px;font-size:12px;margin-bottom:14px
}
.hero h1{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.hero h1 span{
  background:linear-gradient(135deg,#4cc9f0,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.hero p{color:var(--muted);font-size:14px;max-width:420px;margin:0 auto}

/* ===== WIZARD ===== */
.wizard{padding:30px 5% 80px;max-width:920px;margin:0 auto}

/* ===== BREADCRUMB ===== */
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:28px;flex-wrap:wrap}
.bc-step{
  display:flex;align-items:center;gap:6px;font-size:13px;
  color:var(--muted);cursor:pointer;transition:.2s;
  padding:5px 10px;border-radius:7px
}
.bc-step:hover{color:#e2e8f0;background:rgba(255,255,255,0.05)}
.bc-step.done{color:var(--a)}
.bc-step.active{color:#e2e8f0;font-weight:600}
.bc-num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700
}
.bc-step.done .bc-num{background:rgba(76,201,240,0.2);color:var(--a)}
.bc-step.active .bc-num{background:var(--a);color:#0a0f1e}
.bc-arrow{color:var(--muted);font-size:12px}

/* ===== STEP LABEL ===== */
.step-label{
  font-size:13px;color:var(--muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:16px;display:flex;align-items:center;gap:8px
}
.step-label span{
  background:var(--a);color:#0a0f1e;
  width:20px;height:20px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800
}

/* ===== BACK BTN ===== */
.back-btn{
  background:rgba(255,255,255,0.05);color:var(--muted);
  border:1px solid var(--b);padding:8px 16px;border-radius:8px;
  font-size:13px;cursor:pointer;transition:.2s;margin-bottom:20px;
  display:inline-block
}
.back-btn:hover{color:#e2e8f0;border-color:var(--b2)}

/* ===== STEP 1 : FILIERE GRID ===== */
.grid-choices{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:10px;margin-bottom:32px
}
.choice{
  background:var(--card);border:1px solid var(--b);border-radius:12px;
  padding:18px 14px;cursor:pointer;transition:.2s;
  display:flex;flex-direction:column;gap:6px
}
.choice:hover{border-color:var(--b2);transform:translateY(-2px);background:#151f35}
.ch-icon{font-size:24px;margin-bottom:2px}
.ch-title{font-size:14px;font-weight:700}
.ch-sub{font-size:11px;color:var(--muted);line-height:1.5}
.ch-badge{
  display:inline-block;padding:2px 8px;border-radius:5px;
  font-size:10px;font-weight:700;margin-top:4px;width:fit-content
}

/* ===== STEP 2 : SEMESTRE GRID ===== */
.sem-grid{
  display:grid;grid-template-columns:repeat(6,1fr);
  gap:10px;margin-bottom:32px
}
.sem-card{
  background:var(--card);border:1px solid var(--b);border-radius:11px;
  padding:16px 8px;cursor:pointer;transition:.2s;text-align:center
}
.sem-card:hover{border-color:var(--b2);background:#151f35;transform:translateY(-2px)}
.sem-num{font-size:22px;font-weight:800;color:var(--a)}
.sem-lbl{font-size:10px;color:var(--muted);margin-top:4px}
.sem-cnt{font-size:10px;color:var(--a);margin-top:5px}

/* ===== STEP 3 : MODULE GRID ===== */
.mod-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:10px;margin-bottom:16px
}
.mod-card{
  background:var(--card);border:1px solid var(--b);border-radius:11px;
  padding:15px;cursor:pointer;transition:.2s;
  display:flex;align-items:center;gap:12px
}
.mod-card:hover{border-color:var(--b2);background:#151f35;transform:translateY(-2px)}
.mod-ic{
  width:38px;height:38px;border-radius:9px;flex-shrink:0;
  background:rgba(76,201,240,0.1);border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;font-size:16px
}
.mod-nm{font-size:13px;font-weight:600;color:#e2e8f0}
.mod-cd{font-size:11px;color:var(--muted);margin-top:2px}

/* ===== STEP 4 : TYPE GRID ===== */
.type-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:14px;margin-bottom:32px
}
.type-card{
  background:var(--card);border:2px solid var(--b);border-radius:14px;
  padding:26px 16px;cursor:pointer;transition:.2s;text-align:center
}
.type-card:hover{transform:translateY(-3px)}
.tc-cours:hover{border-color:#4cc9f0;background:rgba(76,201,240,0.07)}
.tc-td:hover{border-color:#a78bfa;background:rgba(167,139,250,0.07)}
.tc-exam:hover{border-color:#fbbf24;background:rgba(251,191,36,0.07)}
.tc-icon{font-size:34px;margin-bottom:12px}
.tc-title{font-size:17px;font-weight:700}
.tc-sub{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5}
.tc-count{
  display:inline-block;padding:4px 12px;border-radius:6px;
  font-size:11px;font-weight:700;margin-top:10px
}
.cc{background:rgba(76,201,240,0.15);color:#4cc9f0}
.tc{background:rgba(167,139,250,0.15);color:#a78bfa}
.ec{background:rgba(251,191,36,0.15);color:#fbbf24}

/* ===== STEP 5 : FILES ===== */
.files-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.file-item{
  background:var(--card);border:1px solid var(--b);border-radius:11px;
  padding:15px 18px;display:flex;align-items:center;
  justify-content:space-between;transition:.2s
}
.file-item:hover{border-color:var(--b2)}
.fi-left{display:flex;align-items:center;gap:12px}
.fi-icon{font-size:20px}
.fi-name{font-size:14px;font-weight:500;color:#e2e8f0}
.fi-meta{font-size:11px;color:var(--muted);margin-top:3px}
.fi-right{display:flex;gap:7px;align-items:center}
.dl-btn{
  background:rgba(76,201,240,0.1);color:var(--a);
  border:1px solid var(--b2);padding:8px 16px;border-radius:8px;
  font-size:13px;font-weight:600;text-decoration:none;
  transition:.15s;white-space:nowrap
}
.dl-btn:hover{background:rgba(76,201,240,0.22)}
.del-f{
  background:rgba(239,68,68,0.08);color:#f87171;
  border:1px solid rgba(239,68,68,0.2);
  padding:8px 11px;border-radius:8px;font-size:12px;cursor:pointer;transition:.15s
}
.del-f:hover{background:rgba(239,68,68,0.2)}

/* ===== ADD BTN ===== */
.add-btn{
  background:rgba(76,201,240,0.07);color:var(--a);
  border:1px dashed var(--b2);padding:14px;border-radius:11px;
  font-size:13px;font-weight:600;cursor:pointer;transition:.2s;
  width:100%;text-align:center;display:block
}
.add-btn:hover{background:rgba(76,201,240,0.15)}

/* ===== EMPTY STATE ===== */
.empty-box{
  text-align:center;padding:40px 20px;
  background:var(--card);border:1px dashed var(--b2);
  border-radius:12px;color:var(--muted);font-size:14px;
  line-height:1.8
}

/* ===== MODAL ===== */
.mo{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.75);z-index:500;
  align-items:center;justify-content:center;padding:20px
}
.mo.open{display:flex}
.modal{
  background:#131c2e;border:1px solid var(--b2);
  border-radius:16px;padding:28px;width:100%;max-width:430px
}
.modal h3{font-size:16px;font-weight:700;margin-bottom:20px;color:var(--a)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
.fg input,
.fg select{
  width:100%;background:#0a0f1e;border:1px solid var(--b2);
  color:#e2e8f0;padding:10px 12px;border-radius:8px;font-size:13px;outline:none
}
.fg input:focus,
.fg select:focus{border-color:var(--a)}
.fg select option{background:#131c2e}
.mbtns{display:flex;gap:8px;margin-top:20px}
.mb-ok{
  background:var(--a);color:#0a0f1e;border:none;
  padding:11px 20px;border-radius:8px;font-weight:700;
  font-size:13px;cursor:pointer;flex:1;transition:.2s
}
.mb-ok:hover{background:#38b6d9}
.mb-cl{
  background:transparent;color:var(--muted);
  border:1px solid var(--b);padding:11px 20px;
  border-radius:8px;font-size:13px;cursor:pointer;transition:.2s
}
.mb-cl:hover{color:#e2e8f0;border-color:var(--b2)}

/* ===== TOAST ===== */
.toast{
  position:fixed;bottom:22px;right:22px;
  background:#1a2236;border:1px solid var(--b2);color:var(--a);
  padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;
  opacity:0;transform:translateY(8px);transition:.3s;z-index:1000;pointer-events:none
}
.toast.show{opacity:1;transform:translateY(0)}

/* ===== RESPONSIVE ===== */
@media(max-width:650px){
  .sem-grid{grid-template-columns:repeat(3,1fr)}
  .type-grid{grid-template-columns:1fr}
  .grid-choices{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:24px}
  nav ul li:not(:last-child){display:none}
}
</style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav>
  <div class="logo">
    <div class="li">S</div>
    ScienceHub
  </div>
  <ul>
    <li><a href="#">Accueil</a></li>

<!-- ===== HERO ===== -->

  <p>Choisissez votre filière, semestre, module et type de document.</p>
</div>

<!-- ===== WIZARD ===== -->
<div class="wizard">
  <div class="breadcrumb" id="bc"></div>
  <div id="step-content"></div>
</div>

<!-- ===== MODAL : AJOUTER FICHIER ===== -->
<div class="mo" id="m-file">
  <div class="modal">
    <h3>📎 Ajouter un document</h3>
    <div class="fg">
      <label>Titre du document</label>
      <input type="text" id="fn" placeholder="ex : Cours Analyse 3 — Chapitre 1">
    </div>
    <div class="fg">
      <label>Type</label>
      <select id="ft">
        <option value="cours">📖 Cours</option>
        <option value="td">📝 TD / Série d'exercices</option>
        <option value="exam">🎓 Examen / Contrôle</option>
      </select>
    </div>
    <div class="fg">
      <label>Lien URL (Google Drive, OneDrive…)</label>
      <input type="text" id="fu" placeholder="https://drive.google.com/...">
    </div>
    <div class="mbtns">
      <button class="mb-ok" onclick="saveFile()">Ajouter</button>
      <button class="mb-cl" onclick="cm('m-file')">Annuler</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

const SL = {
  1:"Semestre 1",2:"Semestre 2",3:"Semestre 3",
  4:"Semestre 4",5:"Semestre 5",6:"Semestre 6"
};
const SS = {
  1:"Fondements",2:"Approfondissement",3:"Spécialisation 1",
  4:"Spécialisation 2",5:"Avancé",6:"PFE / Mémoire"
};

// ========================================
// STATE
// ========================================
let st = { fil:null, sem:null, mod:null, type:null };

// ========================================
// UTILS
// ========================================
function uid() { return 'x' + Math.random().toString(36).slice(2, 8); }

function cm(id) { document.getElementById(id).classList.remove('open'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ========================================
// RENDER PRINCIPAL
// ========================================
function render() {
  renderBC();
  const c = document.getElementById('step-content');
  if (!st.fil)        renderStep1(c);
  else if (!st.sem)   renderStep2(c);
  else if (!st.mod)   renderStep3(c);
  else if (!st.type)  renderStep4(c);
  else                renderStep5(c);
}

// ========================================
// BREADCRUMB
// ========================================
function renderBC() {
  const steps = [
    { n:1, label: st.fil  ? F[st.fil].label                                    : "Filière"  },
    { n:2, label: st.sem  ? SL[st.sem]                                         : "Semestre" },
    { n:3, label: st.mod  ? st.mod.name                                         : "Module"   },
    { n:4, label: st.type ? {cours:"Cours",td:"TD",exam:"Examen"}[st.type]     : "Type"     },
    { n:5, label: "Documents" }
  ];
  const cur = !st.fil ? 1 : !st.sem ? 2 : !st.mod ? 3 : !st.type ? 4 : 5;
  document.getElementById('bc').innerHTML = steps.map((s, i) => `
    ${i > 0 ? '<span class="bc-arrow">›</span>' : ''}
    <div class="bc-step ${s.n < cur ? 'done' : s.n === cur ? 'active' : ''}"
      ${s.n < cur ? `onclick="goStep(${s.n})"` : ''}>
      <span class="bc-num">${s.n < cur ? '✓' : s.n}</span>
      <span>${s.label}</span>
    </div>`).join('');
}

function goStep(n) {
  if      (n <= 1) { st = {fil:null,sem:null,mod:null,type:null}; }
  else if (n === 2) { st.sem=null; st.mod=null; st.type=null; }
  else if (n === 3) { st.mod=null; st.type=null; }
  else if (n === 4) { st.type=null; }
  render();
}

// ========================================
// ÉTAPE 1 — FILIÈRE
// ========================================
function renderStep1(c) {
  c.innerHTML = `
    <div class="step-label"><span>1</span>Choisissez votre filière</div>
    <div class="grid-choices">
      ${Object.entries(F).map(([k, f]) => `
        <div class="choice" onclick="selFil('${k}')">
          <div class="ch-icon">${f.icon}</div>
          <div class="ch-title" style="color:${f.color}">${f.label}</div>
          <div class="ch-sub">${f.full}</div>
          <span class="ch-badge" style="background:${f.color}22;color:${f.color}">
            ${Object.values(f.sems).flat().length} modules
          </span>
        </div>`).join('')}
    </div>`;
}

function selFil(k) {
  st = { fil:k, sem:null, mod:null, type:null };
  render();
}

// ========================================
// ÉTAPE 2 — SEMESTRE
// ========================================
function renderStep2(c) {
  const f = F[st.fil];
  c.innerHTML = `
    <button class="back-btn" onclick="goStep(1)">← Retour</button>
    <div class="step-label">
      <span>2</span>Choisissez le semestre
      <span style="background:none;width:auto;height:auto;color:${f.color};font-size:13px;border-radius:0">
        — ${f.label}
      </span>
    </div>
    <div class="sem-grid">
      ${[1,2,3,4,5,6].map(s => `
        <div class="sem-card" onclick="selSem(${s})">
          <div class="sem-num">S${s}</div>
          <div class="sem-lbl">${SS[s]}</div>
          <div class="sem-cnt">${(f.sems[s]||[]).length} module(s)</div>
        </div>`).join('')}
    </div>`;
}

function selSem(s) {
  st.sem = s; st.mod = null; st.type = null;
  render();
}

// ========================================
// ÉTAPE 3 — MODULE
// ========================================
function renderStep3(c) {
  const mods = F[st.fil].sems[st.sem] || [];
  c.innerHTML = `
    <button class="back-btn" onclick="goStep(2)">← Retour</button>
    <div class="step-label"><span>3</span>Choisissez le module — ${SL[st.sem]}</div>
    ${mods.length === 0
      ? `<div class="empty-box">
           📂 Aucun module pour ce semestre.<br>
           <button class="add-btn" style="margin-top:14px;display:inline-block;width:auto;padding:10px 22px"
             onclick="addModHere()">+ Ajouter un module</button>
         </div>`
      : `<div class="mod-grid">
           ${mods.map(m => `
             <div class="mod-card" onclick="selMod('${m.id}')">
               <div class="mod-ic">${m.icon}</div>
               <div>
                 <div class="mod-nm">${m.name}</div>
                 <div class="mod-cd">${m.code} · ${m.files.length} fichier${m.files.length !== 1 ? 's' : ''}</div>
               </div>
             </div>`).join('')}
         </div>
         <button class="add-btn" onclick="addModHere()">+ Ajouter un nouveau module</button>`
    }`;
}

function selMod(id) {
  const mods = F[st.fil].sems[st.sem] || [];
  st.mod = mods.find(m => m.id === id);
  st.type = null;
  render();
}

function addModHere() {
  const name = prompt('Nom du module :');
  if (!name) return;
  const code = prompt('Code (ex: MAT301) :', '') || 'MOD';
  const icon = prompt('Icône (1-2 caractères) :', '📄') || '📄';
  const mod = { id: uid(), name: name.trim(), code, icon, files: [] };
  if (!F[st.fil].sems[st.sem]) F[st.fil].sems[st.sem] = [];
  F[st.fil].sems[st.sem].push(mod);
  toast('✓ Module "' + mod.name + '" ajouté !');
  render();
}

// ========================================
// ÉTAPE 4 — TYPE
// ========================================
function renderStep4(c) {
  const m = st.mod;
  const nc = m.files.filter(f => f.type === 'cours').length;
  const nt = m.files.filter(f => f.type === 'td').length;
  const ne = m.files.filter(f => f.type === 'exam').length;
  c.innerHTML = `
    <button class="back-btn" onclick="goStep(3)">← Retour</button>
    <div class="step-label"><span>4</span>Type de document — ${m.name}</div>
    <div class="type-grid">
      <div class="type-card tc-cours" onclick="selType('cours')">
        <div class="tc-icon">📖</div>
        <div class="tc-title" style="color:#4cc9f0">Cours</div>
        <div class="tc-sub">Cours magistraux & polycopiés</div>
        <span class="tc-count cc">${nc} fichier${nc !== 1 ? 's' : ''}</span>
      </div>
      <div class="type-card tc-td" onclick="selType('td')">
        <div class="tc-icon">📝</div>
        <div class="tc-title" style="color:#a78bfa">TD / Séries</div>
        <div class="tc-sub">Travaux dirigés & exercices</div>
        <span class="tc-count tc">${nt} fichier${nt !== 1 ? 's' : ''}</span>
      </div>
      <div class="type-card tc-exam" onclick="selType('exam')">
        <div class="tc-icon">🎓</div>
        <div class="tc-title" style="color:#fbbf24">Examens</div>
        <div class="tc-sub">Contrôles, examens & corrigés</div>
        <span class="tc-count ec">${ne} fichier${ne !== 1 ? 's' : ''}</span>
      </div>
    </div>`;
}

function selType(t) {
  st.type = t;
  render();
}

// ========================================
// ÉTAPE 5 — DOCUMENTS
// ========================================
function renderStep5(c) {
  const m = st.mod;
  const typeLabel = { cours:"Cours", td:"TD / Séries", exam:"Examens" }[st.type];
  const typeIcon  = { cours:"📖",    td:"📝",           exam:"🎓"    }[st.type];
  const cls       = { cours:"cc",    td:"tc",            exam:"ec"    }[st.type];
  const files = m.files.filter(f => f.type === st.type);

  c.innerHTML = `
    <button class="back-btn" onclick="goStep(4)">← Retour</button>
    <div class="step-label">
      <span>5</span>${typeLabel} — ${m.name}
      <span class="tc-count ${cls}" style="background:none;width:auto;height:auto;border-radius:0;font-size:12px">
        ${files.length} fichier${files.length !== 1 ? 's' : ''}
      </span>
    </div>
    ${files.length === 0
      ? `<div class="empty-box">
           ${typeIcon} Aucun ${typeLabel.toLowerCase()} disponible pour ce module.<br>
           <span style="font-size:12px;display:block;margin-top:6px">
             Soyez le premier à contribuer !
           </span>
         </div>`
      : `<div class="files-list">
           ${files.map(f => `
             <div class="file-item">
               <div class="fi-left">
                 <div class="fi-icon">${typeIcon}</div>
                 <div>
                   <div class="fi-name">${f.name}</div>
                   <div class="fi-meta">${m.name} · ${SL[st.sem]} · ${F[st.fil].label}</div>
                 </div>
               </div>
               <div class="fi-right">
                 <a href="${f.url}" class="dl-btn" target="_blank">↓ Télécharger</a>
                 <button class="del-f" onclick="delFile('${f.id}')">✕</button>
               </div>
             </div>`).join('')}
         </div>`
    }
    <button class="add-btn" onclick="openAddFile()">
      + Ajouter un ${typeLabel.toLowerCase()}
    </button>`;
}

// ========================================
// AJOUTER / SUPPRIMER FICHIER
// ========================================
function openAddFile() {
  document.getElementById('fn').value = '';
  document.getElementById('fu').value = '';
  document.getElementById('ft').value = st.type;
  document.getElementById('m-file').classList.add('open');
}

function saveFile() {
  const name = document.getElementById('fn').value.trim();
  const type = document.getElementById('ft').value;
  const url  = document.getElementById('fu').value.trim() || '#';
  if (!name) { alert('Veuillez saisir un titre'); return; }
  st.mod.files.push({ id: uid(), name, type, url });
  cm('m-file');
  if (type !== st.type) { st.type = type; }
  render();
  toast('✓ Document "' + name + '" ajouté !');
}

function delFile(id) {
  if (!confirm('Supprimer ce fichier ?')) return;
  st.mod.files = st.mod.files.filter(f => f.id !== id);
  render();
  toast('Fichier supprimé');
}

// ========================================
// FERMER MODAL EN CLIQUANT DEHORS
// ========================================
document.querySelectorAll('.mo').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) o.classList.remove('open');
  });
});

// ========================================
// INIT
// ========================================
render();
</script>
</body>
</html>

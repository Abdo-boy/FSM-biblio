<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScienceHub — Filières Marocaines</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1e;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
:root{
  --a:#4cc9f0;--a2:#7b5ea7;--card:#111827;
  --b:rgba(76,201,240,0.15);--b2:rgba(76,201,240,0.3);
  --muted:#8b9ab0;--r:12px
}

/* ===== NAVBAR ===== */
nav{
  background:rgba(10,15,30,0.97);
  display:flex;justify-content:space-between;align-items:center;
  padding:0 5%;height:62px;position:sticky;top:0;z-index:200;
  border-bottom:1px solid var(--b)
}
.logo{font-size:20px;font-weight:800;color:var(--a);display:flex;align-items:center;gap:8px}
.logo-i{
  width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,#4cc9f0,#7b5ea7);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff
}
nav ul{display:flex;list-style:none;gap:2px;align-items:center}
nav ul li a{
  color:var(--muted);text-decoration:none;padding:7px 13px;
  border-radius:7px;font-size:13px;transition:.2s;display:block
}
nav ul li a:hover{color:#e2e8f0;background:rgba(255,255,255,0.06)}
.nav-cta{background:var(--a);color:#0a0f1e !important;font-weight:700;border-radius:7px}
.nav-cta:hover{background:#38b6d9 !important}
.dd{position:relative}
.dd-menu{
  display:none;position:absolute;top:calc(100% + 6px);left:0;
  background:#131c2e;border:1px solid var(--b2);border-radius:10px;
  min-width:160px;padding:5px;box-shadow:0 16px 32px rgba(0,0,0,.5);z-index:300
}
.dd-menu a{display:block;padding:8px 12px;border-radius:7px;color:var(--muted)!important;font-size:12px;transition:.15s}
.dd-menu a:hover{background:rgba(76,201,240,0.1);color:var(--a)!important}
.dd:hover .dd-menu{display:block}

/* ===== HERO ===== */
.hero{
  text-align:center;padding:60px 5% 40px;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(76,201,240,0.1),transparent)
}
.hbadge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(76,201,240,0.1);border:1px solid var(--b2);
  color:var(--a);padding:5px 13px;border-radius:20px;font-size:12px;margin-bottom:18px
}
.hero h1{font-size:38px;font-weight:800;line-height:1.2;margin-bottom:12px;letter-spacing:-1px}
.hero h1 span{
  background:linear-gradient(135deg,#4cc9f0,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.hero p{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto 24px;line-height:1.7}
.hbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bp{
  background:var(--a);color:#0a0f1e;padding:11px 24px;border-radius:9px;
  font-weight:700;font-size:14px;text-decoration:none;transition:.2s;
  border:none;cursor:pointer
}
.bp:hover{background:#38b6d9;transform:translateY(-1px)}
.bo{
  background:transparent;color:var(--a);padding:11px 24px;border-radius:9px;
  font-weight:600;font-size:14px;text-decoration:none;transition:.2s;
  border:1px solid var(--b2);cursor:pointer
}
.bo:hover{background:rgba(76,201,240,0.08)}

/* ===== STATS ===== */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
  max-width:700px;margin:40px auto 0;padding:0 5%
}
.sc{
  background:var(--card);border:1px solid var(--b);
  border-radius:10px;padding:18px;text-align:center
}
.sn{font-size:26px;font-weight:800;color:var(--a)}
.sl{font-size:12px;color:var(--muted);margin-top:2px}

/* ===== MAIN CONTENT ===== */
.main{padding:40px 5% 60px}

/* ===== FILIERE TABS ===== */
.fil-label{
  font-size:13px;color:var(--muted);margin-bottom:10px;
  font-weight:600;text-transform:uppercase;letter-spacing:.5px
}
.fil-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.ftab{
  background:var(--card);border:1px solid var(--b);color:var(--muted);
  padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;
  transition:.2s;font-weight:500
}
.ftab:hover{border-color:var(--b2);color:#e2e8f0}
.ftab.active{background:rgba(76,201,240,0.12);border-color:var(--b2);color:var(--a)}

/* ===== SEMESTRE TABS ===== */
.sem-tabs{display:flex;gap:6px;margin-bottom:28px;flex-wrap:wrap}
.stab{
  background:var(--card);border:1px solid var(--b);color:var(--muted);
  padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;transition:.2s
}
.stab:hover{border-color:var(--b2);color:#e2e8f0}
.stab.active{background:rgba(76,201,240,0.12);border-color:var(--b2);color:var(--a);font-weight:600}

/* ===== SEMESTRE PANEL ===== */
.sem-content{display:none}
.sem-content.active{display:block}
.sem-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--b)
}
.sem-left{display:flex;align-items:center;gap:12px}
.sem-badge{
  width:44px;height:44px;border-radius:10px;
  background:linear-gradient(135deg,rgba(76,201,240,0.2),rgba(123,94,167,0.2));
  border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:var(--a)
}
.sem-title{font-size:20px;font-weight:700}
.sem-sub{font-size:12px;color:var(--muted);margin-top:2px}
.add-mod-btn{
  background:rgba(76,201,240,0.1);color:var(--a);
  border:1px dashed var(--b2);padding:9px 18px;border-radius:9px;
  font-size:13px;font-weight:600;cursor:pointer;transition:.2s;
  display:flex;align-items:center;gap:6px
}
.add-mod-btn:hover{background:rgba(76,201,240,0.18)}

/* ===== MODULE GRID ===== */
.mods-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.mod-card{
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--r);overflow:hidden;transition:.2s
}
.mod-card:hover{border-color:var(--b2);transform:translateY(-2px)}
.mod-head{
  padding:15px 18px 12px;border-bottom:1px solid var(--b);
  display:flex;align-items:center;justify-content:space-between
}
.mod-head-left{display:flex;align-items:center;gap:9px}
.mod-icon{
  width:34px;height:34px;border-radius:8px;
  background:rgba(76,201,240,0.12);border:1px solid var(--b2);
  display:flex;align-items:center;justify-

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScienceHub Maroc</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            ScienceHub Maroc
        </div>

        <ul>
            <li><a href="#">Accueil</a></li>
            <li><a href="#">Filières</a></li>
            <li><a href="#">Examens</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <h1>Bibliothèque Universitaire Marocaine</h1>
    <p>Cours, TD et Examens des Facultés des Sciences</p>

    <input type="text" id="search"
    placeholder="Rechercher un module...">
</section>

<section class="semestres">

    <div class="card">
        <h2>S1</h2>

        <div class="filiere">
            <h3>MIP</h3>

            <div class="categorie">
                <h4>📚 Cours</h4>

                <div class="document">
                    Analyse 1.pdf

                    <a href="#">
                        Télécharger
                    </a>
                </div>

            </div>

            <div class="categorie">
                <h4>📝 TD</h4>
            </div>

            <div class="categorie">
                <h4>🎓 Examens</h4>
            </div>

        </div>

    </div>

</section>

<button id="addBtn">
➕ Ajouter un document
</button>

<script src="script.js"></script>

</body>
</html>
